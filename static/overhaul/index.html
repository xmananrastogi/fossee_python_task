<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOSSEE Workshop Portal | Redefined</title>
    <meta name="description" content="A premium, performance-first workshop booking portal for the FOSSEE project, IIT Bombay.">
    
    <!-- Design System -->
    <link rel="stylesheet" href="./style.css">
    
    <!-- ES Module Shims for cross-browser reliability -->
    <script async src="https://ga.jspm.io/npm:es-module-shims@1.10.0/dist/es-module-shims.js"></script>

    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.3.1",
        "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
        "framer-motion": "https://esm.sh/framer-motion@11.11.11",
        "lucide-react": "https://esm.sh/lucide-react@0.454.0"
      }
    }
    </script>
</head>
<body>
    <div id="root">
        <!-- Initial sleek loader while ESM modules resolve -->
        <div id="initial-loader" style="height: 100vh; display: flex; align-items: center; justify-content: center; background: #020617;">
            <div style="width: 48px; height: 48px; border: 3px solid rgba(99, 102, 241, 0.2); border-top-color: #6366f1; border-radius: 50%; animate: spin 1s linear infinite;"></div>
            <style>
                @keyframes spin { to { transform: rotate(360deg); } }
            </style>
        </div>
    </div>

    <!-- Application Logic -->
    <script type="module" src="./src/App.js"></script>
</body>
</html>
